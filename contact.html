<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body style="--bg: #5a5d61;">

<div class="flash-overlay" id="flashOverlay"></div>
<script>
(function () {
  var el = document.getElementById('flashOverlay');
  function applyFlash() {
    el.classList.remove('is-flashing-full', 'is-flashing-in', 'is-flashing-out');
    void el.offsetWidth; // restart the animation
    if (sessionStorage.getItem('flashPending')) {
      sessionStorage.removeItem('flashPending');
      el.classList.add('is-flashing-out');
    } else {
      el.classList.add('is-flashing-full');
    }
  }
  applyFlash();
  // bfcache restore (browser back/forward) doesn't re-run this script — without
  // this, a flash frozen mid-animation when you navigated away stays stuck
  // frozen on that frame when you come back
  window.addEventListener('pageshow', function (e) {
    if (e.persisted) applyFlash();
  });
})();
</script>

<div class="page">
  <p class="intro">call me....</p>

  <div class="frame">
    <!-- image picked at random from assets/images/contact/ on every load — see js/script.js -->
    <div class="frame-img" id="contactImg"></div>
  </div>

  <p class="tagline">
    <a href="#" class="modal-trigger" id="emailLink">email</a>
    <a href="https://instagram.com/jackktierney" target="_blank" rel="noopener">instagram</a>
    <a href="index.html">home</a>
  </p>
</div>

<div class="modal-overlay" id="emailModal">
  <div class="modal-box">
    <div class="modal-text">
      <p>jack@murmurcollective.co.uk</p>
    </div>
    <button type="button" class="modal-close">close</button>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
